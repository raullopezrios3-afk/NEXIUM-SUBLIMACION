<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sublimación y Promocionales</title>

    <meta name="description" content="Productos promocionales personalizados y sublimación para empresas y particulares.">

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilos.css?v=2">
</head>

<body>

<!-- ========================= -->
<!-- HEADER -->
<!-- ========================= -->

<header>

 <div class="logo">

    <div class="brand-block">

        <img class="logo-img" src="imagenes/logo.png" alt="Logo">

        <img class="nombre-img" src="imagenes/nombre.png" alt="NEXIUM">

    </div>

    <img class="eslogan-img" src="imagenes/eslogan.png" alt="Eslogan">

</div>
    <nav>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#productos">Productos</a></li>
            <li><a href="#galeria">Galería</a></li>
            <li><a href="#videos">Videos</a></li>
            <li><a href="#cotizacion">Cotización</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

</header>

<!-- ========================= -->
<!-- BANNER -->
<!-- ========================= -->

<section id="inicio">

    <div class="slider">

        <div class="slide active">
            <img src="imagenes/banner-1.jpg">
        </div>

        <div class="slide">
            <img src="imagenes/banner-2.jpg">
        </div>

        <div class="slide">
            <img src="imagenes/banner-3.jpg">
        </div>

    </div>

</section>

<!-- ========================= -->
<!-- PRODUCTOS -->
<!-- ========================= -->

<section id="productos">
    <div class="contenedor">

    <h2>Productos Destacados</h2>

         </div>
        
</section>

<!-- ========================= -->
<!-- GALERIA -->
<!-- ========================= -->

<section id="galeria">
    <h2>Galería</h2>
</section>

<!-- ========================= -->
<!-- VIDEOS -->
<!-- ========================= -->

<section id="videos">
    <h2>Video Promocional</h2>
</section>

<!-- ========================= -->
<!-- COTIZACION -->
<!-- ========================= -->

<section id="cotizacion">

    <h2>Solicita tu Cotización</h2>

    <form id="formCotizacion">

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="tel" id="telefono" placeholder="Teléfono">
        <input type="email" id="correo" placeholder="Correo">

        <select id="producto">
            <option value="">Producto</option>
            <option>Tazas</option>
            <option>Termos</option>
        </select>

        <input type="number" id="cantidad" placeholder="Cantidad">
        <input type="date" id="fecha">

        <textarea id="descripcion" placeholder="Descripción"></textarea>

        <button type="button" onclick="enviarWhatsApp()">
            Solicitar Cotización
        </button>

    </form>

</section>

<!-- ========================= -->
<!-- CONTACTO -->
<!-- ========================= -->

<section id="contacto">
    <h2>Contacto</h2>
    <p>Ciudad de México</p>
</section>

    <footer>

    <div class="contenedor">

        <p>

            © 2026 NEXIUM

        </p>

    </div>

</footer>

<!-- ========================= -->
<!-- WHATSAPP -->
<!-- ========================= -->

<a href="https://wa.me/5215512345678"
   class="whatsapp-float"
   target="_blank">

    <img src="imagenes/whatsapp.png" alt="WhatsApp">

 </a>

<!-- JS -->
<script src="js/scripts.js"></script>

</body>
</html>
